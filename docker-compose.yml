services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8090
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3345
      - DB_DATABASE=myproject
      - DB_USERNAME=myproject
      - DB_PASSWORD=myproject
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=sync
      - BROADCAST_CONNECTION=reverb
      - BROADCAST_DRIVER=reverb
      - REVERB_APP_ID=myproject-app
      - REVERB_APP_KEY=myproject-key
      - REVERB_APP_SECRET=myproject-secret
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8081
      - REVERB_SCHEME=http
      - REVERB_SERVER_HOST=reverb
      - REVERB_SERVER_PORT=8081
      - VITE_REVERB_HOST=0.0.0.0
      - VITE_REVERB_PORT=8081
      - VITE_REVERB_SCHEME=http
      - VITE_REVERB_APP_KEY=myproject-key
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_storage:/app/storage
      - app_public_uploads:/app/public/uploads

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=8081
    ports:
      - "8081:8081"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8090
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3345
      - DB_DATABASE=myproject
      - DB_USERNAME=myproject
      - DB_PASSWORD=myproject
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=sync
      - BROADCAST_CONNECTION=reverb
      - BROADCAST_DRIVER=reverb
      - REVERB_APP_ID=myproject-app
      - REVERB_APP_KEY=myproject-key
      - REVERB_APP_SECRET=myproject-secret
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8081
      - REVERB_SCHEME=http
      - REVERB_SERVER_HOST=reverb
      - REVERB_SERVER_PORT=8081
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "3307:3345"
    environment:
      MYSQL_DATABASE: myproject
      MYSQL_USER: myproject
      MYSQL_PASSWORD: myproject
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  app_storage:
  app_public_uploads:
