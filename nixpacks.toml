[phases.setup]
nixPkgs = ["php83", "nodejs"]

[phases.build]
cmds = [
    "cp .env.example .env",
    "php artisan key:generate --force",
    "composer install --no-dev --optimize-autoloader",
    "npm install",
    "npm run build"
]

[phases.start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
